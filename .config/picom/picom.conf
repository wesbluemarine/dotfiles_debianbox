#################################
#             Backend           #
#################################
backend = "glx";
vsync = false;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 25;
shadow-opacity = 0.3;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-ignore-shaped = true;

shadow-exclude = [
  "class_g = 'Chromium'",
  "class_g = 'lemonbar'",
  "class_g = 'bar'",
  "name = 'bar.sh'",
  "class_g = 'tint2'",
  "class_g = 'dmenu'",
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  # --- SELECTIVE SHADOW FILTERING ---
  # Exclude shadows from any menu that HAS a defined window class (Thunar, Chrome, etc.)
  # This leaves ONLY Openbox menus (which have no class) with shadows.
  "window_type = 'popup_menu' && class_g != ''",
  "window_type = 'dropdown_menu' && class_g != ''",
  "window_type = 'menu' && class_g != ''",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Corners             #
#################################
corner-radius = 10;

rounded-corners-exclude = [
  "class_g = 'Uxn'",
  "class_i = 'uxn11'",
  "class_g = 'lemonbar'",
  "class_g = 'bar'",
  "name = 'bar.sh'",
  "class_g = 'tint2'",
  "class_g = 'dmenu'",
  # Only Openbox menus stay rounded (those with NO class)
  "window_type = 'popup_menu' && class_g != ''",
  "window_type = 'dropdown_menu' && class_g != ''",
  "window_type = 'menu' && class_g != ''",
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'utility'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_MAXIMIZED_HELPER'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_MAXIMIZED_VERT'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_MAXIMIZED_HORZ'"
];

#################################
#           Fading              #
#################################
fading = false;

#################################
#           Opacity             #
#################################
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

#################################
#       General Settings        #
#################################
mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
log-level = "warn";

wintypes:
{
  # We enable shadow for these types, but the exclude list above 
  # will filter out everything except Openbox.
  popup_menu = { shadow = true; full-shadow = true; }
  dropdown_menu = { shadow = true; full-shadow = true; }
  tooltip = { shadow = false; }
  dock = { shadow = false; }
};
